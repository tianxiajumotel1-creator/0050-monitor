name: 0050 Daily Monitor

on:
  # 設定自動觸發時間 (這是 UTC 時間，台灣時間早上 9:05 = UTC 凌晨 01:05)
  schedule:
    - cron: '5 1 * * 1-5' # 每週一到週五的 UTC 01:05 執行
  # 加入手動觸發按鈕，方便隨時測試
  workflow_dispatch: 

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 下載程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝所需套件
      run: pip install -r requirements.txt

    - name: 執行監控程式
      # 從 GitHub Secrets 讀取變數傳給 Python
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python check_0050.py
